            pwaOS native client app sample code:

    <script src="js/jquery-3.1.1.slim.min.js"></script>
    <script src="highlight/highlight.min.js"></script>
    <script>
        const exampleTabs = [
        {
            ID: '#cppTab',
            codeUrl : 'examples/shell_app.cc',
            active : 'true',
        },
        {
            ID: '#jsTab',
            codeUrl : 'examples/shell.js',
            active : 'false',
        },
        {
            ID: '#mojoTab',
            codeUrl : 'examples/pwaos.mojom',
            active : 'false',
        }];

        function fetchExampleCode(code_url) {
            const myHeaders = new Headers();
            const myRequest = new Request(code_url, {
                method: "GET",
                headers: myHeaders,
                mode: "cors",
                cache: "no-store",
            });

            fetch(myRequest)
                .then((response) => response.blob())
                .then((myBlob) => {
                    myBlob.text().then(function(txt) {
                        console.log(txt);
                        $('#example-code').html(txt);
                        hljs.highlightAll();
                    });
                });

            exampleTabs.forEach((elem) => {
                if (elem.codeUrl == code_url) {
                    $(elem.ID).addClass('bg-neutral-800');
                    $(elem.ID).removeClass('bg-neutral-600');
                } else {
                    $(elem.ID).removeClass('bg-neutral-800');
                    $(elem.ID).addClass('bg-neutral-600');
                    console.log($(elem.ID));
                }
            });
        }

        fetchExampleCode('examples/shell_app.cc');
    </script>

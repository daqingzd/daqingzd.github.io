<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <link href="https://pwaos.net/images/favicon.ico" rel="shortcut icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>pwaos store</title>
    <meta name="description" content="pwa store written in JavaScript that works in the pwaos.">

    <!-- Social media cards start -->
    <meta name="twitter:card" content="summary">

    <meta property="og:url" content="https://www.pwaos.net/store">
    <meta property="og:title" content="pwaos store">
    <meta property="og:description" content="pwa store written in JavaScript that works in the pwaos.">
    <!-- Social media cards end -->

    <style>
        html,body{
            margin: 0;
            border: 0;
            padding: 0;
            height:100%;
            overflow: hidden;
        }
        .container{
            width:100%;
            height:100%;
            margin: 0;
            border: 0;
            padding: 0;
        }
    </style>
</head>
<body>
<iframe class="container" src="https://appsco.pe/"/>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      for (let reg of regs) {
        reg.unregister()
      }
      navigator.serviceWorker.register('/store/sw.js', {scope: '/store/'}).then((registration) => {
        console.log(`Service Worker registered! Scope: ${registration.scope}`);
      },(error) => {
         console.error(`Service Worker registration failed: ${error}`);
      })
    })
  }
</script>
</body>
</html>
